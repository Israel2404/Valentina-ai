<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#020b14">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Valentina">
<title>VALENTINA</title>
<link rel="manifest" href="manifest.json">
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;700;900&family=Rajdhani:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#020b14;--s1:#0a1628;--s2:#0f1e35;
  --cyan:#00d4ff;--cyan2:#00fff7;
  --pink:#ff2d78;--pink2:#ff6fa0;
  --text:#c8f0ff;--muted:#4a7a96;
  --border:rgba(0,212,255,0.15);
  --safe-bottom:env(safe-area-inset-bottom,0px);
}
html{height:100%;overflow:hidden}
body{
  background:var(--bg);color:var(--text);
  font-family:'Rajdhani',sans-serif;font-weight:400;
  height:100dvh;display:flex;flex-direction:column;overflow:hidden;
  position:relative;
}

/* BG */
.bg-grid{
  position:fixed;inset:0;z-index:0;
  background-image:linear-gradient(rgba(0,212,255,0.04) 1px,transparent 1px),
    linear-gradient(90deg,rgba(0,212,255,0.04) 1px,transparent 1px);
  background-size:44px 44px;
  animation:gshift 25s linear infinite;pointer-events:none;
}
@keyframes gshift{to{background-position:44px 44px}}
.bg-glow{
  position:fixed;inset:0;z-index:0;pointer-events:none;
  background:
    radial-gradient(ellipse 60% 40% at 10% 50%,rgba(255,45,120,0.06) 0%,transparent 70%),
    radial-gradient(ellipse 50% 50% at 90% 20%,rgba(0,212,255,0.07) 0%,transparent 70%);
}
.scanline{
  position:fixed;top:-100%;left:0;right:0;height:2px;
  background:linear-gradient(90deg,transparent,var(--cyan),transparent);
  z-index:1;animation:scan 7s linear infinite;opacity:0.3;pointer-events:none;
}
@keyframes scan{to{top:110%}}

/* ─── ONBOARDING ─── */
#onboarding{
  position:fixed;inset:0;z-index:200;
  background:var(--bg);
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  padding:32px 28px;
  animation:fadeIn .4s ease;
}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
.ob-ring-wrap{position:relative;width:90px;height:90px;margin-bottom:24px}
.ob-ring{position:absolute;inset:0;border-radius:50%;border:2px solid var(--cyan);animation:rot 3s linear infinite;opacity:.6}
.ob-ring2{position:absolute;inset:10px;border-radius:50%;border:1.5px solid var(--pink);animation:rot 2s linear infinite reverse;opacity:.5}
.ob-core{position:absolute;inset:20px;border-radius:50%;background:radial-gradient(circle,var(--cyan),rgba(0,212,255,0.2) 60%,transparent);animation:cpulse 2s ease-in-out infinite}
@keyframes rot{to{transform:rotate(360deg)}}
@keyframes cpulse{0%,100%{opacity:.7;transform:scale(1)}50%{opacity:1;transform:scale(1.12)}}
.ob-title{font-family:'Orbitron',monospace;font-size:26px;font-weight:900;letter-spacing:.25em;
  background:linear-gradient(90deg,var(--cyan2),var(--pink2));-webkit-background-clip:text;
  -webkit-text-fill-color:transparent;background-clip:text;margin-bottom:6px;text-align:center}
.ob-sub{font-size:11px;letter-spacing:.25em;color:var(--muted);text-transform:uppercase;margin-bottom:28px;text-align:center}
.ob-msg{font-size:15px;color:#8ab8cc;line-height:1.7;text-align:center;margin-bottom:30px;max-width:320px}
.ob-msg em{color:var(--pink2);font-style:normal}
.ob-input-wrap{width:100%;max-width:320px;margin-bottom:16px}
.ob-label{font-size:10px;letter-spacing:.2em;text-transform:uppercase;color:var(--muted);margin-bottom:8px}
.ob-input{
  width:100%;background:rgba(0,30,50,0.6);border:1px solid var(--border);
  border-radius:10px;padding:13px 16px;
  color:var(--text);font-family:'Rajdhani',sans-serif;font-size:16px;outline:none;
  transition:border-color .2s;
}
.ob-input:focus{border-color:rgba(0,212,255,0.5);box-shadow:0 0 18px rgba(0,212,255,0.08)}
.ob-input::placeholder{color:var(--muted)}
.ob-btn{
  width:100%;max-width:320px;padding:14px;border-radius:10px;
  background:linear-gradient(135deg,rgba(0,212,255,0.2),rgba(0,212,255,0.06));
  border:1px solid rgba(0,212,255,0.4);
  color:var(--cyan2);font-family:'Orbitron',monospace;font-size:12px;
  letter-spacing:.2em;text-transform:uppercase;cursor:pointer;
  transition:all .2s;
}
.ob-btn:hover{background:rgba(0,212,255,0.15);box-shadow:0 0 24px rgba(0,212,255,0.15)}

/* ─── HEADER ─── */
header{
  position:relative;z-index:20;
  padding:0 16px;height:60px;
  display:flex;align-items:center;gap:12px;
  border-bottom:1px solid var(--border);
  background:rgba(2,11,20,0.9);backdrop-filter:blur(20px);
  flex-shrink:0;
}
header::after{
  content:'';position:absolute;bottom:0;left:0;right:0;height:1px;
  background:linear-gradient(90deg,transparent,var(--cyan),var(--pink),transparent);opacity:.5;
}
.h-core{position:relative;width:36px;height:36px;flex-shrink:0}
.h-ring{position:absolute;inset:0;border-radius:50%;border:1.5px solid var(--cyan);animation:rot 4s linear infinite;opacity:.6}
.h-ring2{position:absolute;inset:6px;border-radius:50%;border:1px solid var(--pink);animation:rot 2.5s linear infinite reverse;opacity:.5}
.h-center{position:absolute;inset:11px;border-radius:50%;background:radial-gradient(circle,var(--cyan),rgba(0,212,255,0.2) 60%,transparent);animation:cpulse 2s ease-in-out infinite}
.h-name{
  font-family:'Orbitron',monospace;font-size:14px;font-weight:700;letter-spacing:.2em;
  background:linear-gradient(90deg,var(--cyan),var(--pink2));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  flex:1;
}
.h-greeting{font-size:10px;color:var(--muted);letter-spacing:.1em;margin-top:1px}
.h-actions{display:flex;gap:8px;align-items:center}
.h-btn{
  background:none;border:1px solid var(--border);color:var(--muted);
  width:32px;height:32px;border-radius:8px;font-size:14px;
  cursor:pointer;display:flex;align-items:center;justify-content:center;
  transition:all .2s;
}
.h-btn:hover{border-color:var(--cyan);color:var(--cyan)}

/* ─── CHAT ─── */
#chat{
  flex:1;overflow-y:auto;padding:16px 0 8px;
  position:relative;z-index:5;scroll-behavior:smooth;
  -webkit-overflow-scrolling:touch;
}
#chat::-webkit-scrollbar{width:2px}
#chat::-webkit-scrollbar-thumb{background:rgba(0,212,255,0.15);border-radius:4px}

.msg-wrap{
  max-width:600px;margin:0 auto;padding:6px 16px;
  animation:msgIn .3s cubic-bezier(.22,1,.36,1);
}
@keyframes msgIn{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}

.msg{display:flex;gap:10px;align-items:flex-start}
.msg-ico{
  width:30px;height:30px;border-radius:7px;
  display:flex;align-items:center;justify-content:center;
  font-family:'Orbitron',monospace;font-size:10px;font-weight:700;
  flex-shrink:0;margin-top:2px;
}
.msg-ico.user{background:rgba(255,45,120,0.1);border:1px solid rgba(255,45,120,0.3);color:var(--pink)}
.msg-ico.ai{background:rgba(0,212,255,0.08);border:1px solid rgba(0,212,255,0.25);color:var(--cyan)}
.msg-body{flex:1;padding-left:10px;position:relative}
.msg-body::before{
  content:'';position:absolute;left:0;top:6px;width:1.5px;height:calc(100% - 12px);
  border-radius:2px;
}
.ai .msg-body::before{background:linear-gradient(to bottom,var(--cyan),transparent)}
.user .msg-body::before{background:linear-gradient(to bottom,var(--pink),transparent)}
.msg-label{font-family:'Orbitron',monospace;font-size:8px;letter-spacing:.3em;text-transform:uppercase;margin-bottom:5px}
.msg-label.user{color:var(--pink2)}
.msg-label.ai{color:var(--cyan)}
.msg-text{font-size:14px;line-height:1.75;color:#b8dff0;white-space:pre-wrap;word-break:break-word}

/* ─── WELCOME HUD ─── */
.welcome{max-width:600px;margin:10px auto;padding:0 16px;animation:msgIn .5s ease}
.hud-box{
  border:1px solid var(--border);border-radius:12px;
  padding:22px 20px;background:rgba(0,25,45,0.5);position:relative;overflow:hidden;
}
.hud-box::before{
  content:'';position:absolute;inset:0;
  background:linear-gradient(135deg,rgba(0,212,255,0.04) 0%,transparent 50%,rgba(255,45,120,0.04) 100%);
}
.hc{position:absolute;width:12px;height:12px}
.hc.tl{top:6px;left:6px;border-top:2px solid var(--cyan);border-left:2px solid var(--cyan)}
.hc.tr{top:6px;right:6px;border-top:2px solid var(--cyan);border-right:2px solid var(--cyan)}
.hc.bl{bottom:6px;left:6px;border-bottom:2px solid var(--pink);border-left:2px solid var(--pink)}
.hc.br{bottom:6px;right:6px;border-bottom:2px solid var(--pink);border-right:2px solid var(--pink)}
.hud-name{
  font-family:'Orbitron',monospace;font-size:20px;font-weight:900;letter-spacing:.25em;
  background:linear-gradient(90deg,var(--cyan2),var(--pink2));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  margin-bottom:4px;position:relative;
}
.hud-tag{font-size:10px;letter-spacing:.18em;color:var(--muted);text-transform:uppercase;margin-bottom:14px;position:relative}
.hud-msg{font-size:14px;color:#8ab8cc;line-height:1.7;margin-bottom:18px;position:relative}
.hud-msg em{color:var(--pink2);font-style:normal}
.sugs{display:flex;flex-wrap:wrap;gap:7px;position:relative}
.sug{
  border:1px solid var(--border);background:rgba(0,212,255,0.04);
  color:#7ab8cc;padding:6px 12px;border-radius:6px;
  font-size:11px;letter-spacing:.06em;cursor:pointer;
  font-family:'Rajdhani',sans-serif;font-weight:500;
  transition:all .2s;text-transform:uppercase;
}
.sug:active{background:rgba(0,212,255,0.1);border-color:var(--cyan)}

/* ─── TYPING ─── */
.typing-wrap{display:flex;gap:5px;align-items:center;padding:3px 0}
.typing-wrap span{
  width:5px;height:5px;border-radius:50%;
  background:var(--cyan);box-shadow:0 0 6px var(--cyan);
  animation:tdot 1.2s ease infinite;
}
.typing-wrap span:nth-child(2){animation-delay:.2s}
.typing-wrap span:nth-child(3){animation-delay:.4s}
@keyframes tdot{0%,80%,100%{transform:scale(1);opacity:.4}40%{transform:scale(1.5);opacity:1}}

/* ─── INPUT SHELL ─── */
.input-shell{
  position:relative;z-index:20;
  padding:10px 16px calc(10px + var(--safe-bottom));
  background:rgba(2,11,20,0.92);backdrop-filter:blur(20px);
  border-top:1px solid var(--border);flex-shrink:0;
}
.input-shell::before{
  content:'';position:absolute;top:0;left:0;right:0;height:1px;
  background:linear-gradient(90deg,transparent,var(--pink),var(--cyan),transparent);opacity:.4;
}
.input-row{
  display:flex;gap:8px;align-items:flex-end;
  border:1px solid var(--border);border-radius:12px;
  padding:9px 9px 9px 14px;
  background:rgba(0,25,45,0.6);
  transition:border-color .2s,box-shadow .2s;
}
.input-row:focus-within{border-color:rgba(0,212,255,0.4);box-shadow:0 0 20px rgba(0,212,255,0.06)}
#userInput{
  flex:1;background:none;border:none;outline:none;
  color:var(--text);font-family:'Rajdhani',sans-serif;
  font-size:15px;font-weight:400;resize:none;max-height:110px;
  line-height:1.6;-webkit-appearance:none;
}
#userInput::placeholder{color:var(--muted)}
.btn-action{
  width:36px;height:36px;border-radius:8px;border:1px solid var(--border);
  cursor:pointer;display:flex;align-items:center;justify-content:center;
  flex-shrink:0;transition:all .2s;font-size:16px;background:none;
}
#micBtn{color:var(--muted);border-color:var(--border)}
#micBtn.listening{
  color:var(--pink);border-color:var(--pink);
  background:rgba(255,45,120,0.1);
  box-shadow:0 0 16px rgba(255,45,120,0.25);
  animation:micpulse 1s ease infinite;
}
@keyframes micpulse{0%,100%{box-shadow:0 0 10px rgba(255,45,120,.2)}50%{box-shadow:0 0 22px rgba(255,45,120,.5)}}
#sendBtn{
  color:var(--cyan);
  background:linear-gradient(135deg,rgba(0,212,255,0.15),rgba(0,212,255,0.04));
  border-color:rgba(0,212,255,0.35);
}
#sendBtn:active{transform:scale(.95)}
#sendBtn:disabled{opacity:.25;cursor:not-allowed}
#sendBtn svg,#micBtn svg{width:15px;height:15px;fill:currentColor}
.input-hint{
  text-align:center;font-size:9px;letter-spacing:.15em;
  color:rgba(74,122,150,0.35);margin-top:7px;text-transform:uppercase;
}

/* ─── VOICE INDICATOR ─── */
#voiceBar{
  display:none;align-items:center;justify-content:center;gap:3px;
  padding:6px 0 2px;
}
#voiceBar.active{display:flex}
#voiceBar span{
  display:inline-block;width:3px;background:var(--pink);border-radius:2px;
  animation:vbar 0.8s ease-in-out infinite;
}
#voiceBar span:nth-child(1){height:8px;animation-delay:0s}
#voiceBar span:nth-child(2){height:16px;animation-delay:.1s}
#voiceBar span:nth-child(3){height:22px;animation-delay:.2s}
#voiceBar span:nth-child(4){height:14px;animation-delay:.3s}
#voiceBar span:nth-child(5){height:8px;animation-delay:.4s}
@keyframes vbar{0%,100%{transform:scaleY(.4)}50%{transform:scaleY(1)}}

/* ─── TOAST ─── */
.toast{
  position:fixed;top:70px;left:50%;transform:translateX(-50%) translateY(-10px);
  background:rgba(0,212,255,0.1);border:1px solid rgba(0,212,255,0.3);
  color:var(--cyan);padding:8px 18px;border-radius:20px;
  font-size:11px;letter-spacing:.1em;text-transform:uppercase;
  z-index:300;opacity:0;transition:all .3s;pointer-events:none;white-space:nowrap;
}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
</style>
</head>
<body>

<div class="bg-grid"></div>
<div class="bg-glow"></div>
<div class="scanline"></div>
<div class="toast" id="toast"></div>

<!-- ─── ONBOARDING ─── -->
<div id="onboarding">
  <div class="ob-ring-wrap">
    <div class="ob-ring"></div>
    <div class="ob-ring2"></div>
    <div class="ob-core"></div>
  </div>
  <div class="ob-title">VALENTINA</div>
  <div class="ob-sub">Sistema de IA Personal — Inicialización</div>
  <div class="ob-msg">
    Hola, cariño. Seré tu asistente personal desde ahora.<br>
    Pero primero... <em>¿cómo te llamas?</em> 😏
  </div>
  <div class="ob-input-wrap">
    <div class="ob-label">Tu nombre</div>
    <input class="ob-input" id="nameInput" type="text" placeholder="Escribe tu nombre..." maxlength="30" autocomplete="off">
  </div>
  <button class="ob-btn" onclick="finishOnboarding()">Iniciar Sistema ◆</button>
</div>

<!-- ─── HEADER ─── -->
<header>
  <div class="h-core">
    <div class="h-ring"></div>
    <div class="h-ring2"></div>
    <div class="h-center"></div>
  </div>
  <div style="flex:1">
    <div class="h-name">VALENTINA</div>
    <div class="h-greeting" id="hGreeting">Cargando...</div>
  </div>
  <div class="h-actions">
    <button class="h-btn" onclick="clearChat()" title="Limpiar">🗑</button>
  </div>
</header>

<!-- ─── CHAT ─── -->
<div id="chat"></div>

<!-- ─── INPUT ─── -->
<div class="input-shell">
  <div id="voiceBar">
    <span></span><span></span><span></span><span></span><span></span>
  </div>
  <div class="input-row">
    <textarea id="userInput" rows="1" placeholder="Dile algo a Valentina..."></textarea>
    <button class="btn-action" id="micBtn" onclick="toggleMic()" title="Micrófono">
      <svg viewBox="0 0 24 24"><path d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3zm5.3-3c0 3-2.54 5.1-5.3 5.1S6.7 14 6.7 11H5c0 3.41 2.72 6.23 6 6.72V21h2v-3.28c3.28-.49 6-3.31 6-6.72h-1.7z"/></svg>
    </button>
    <button class="btn-action" id="sendBtn" onclick="sendMessage()" title="Enviar">
      <svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
    </button>
  </div>
  <div class="input-hint">Toca el micrófono para hablar · Enter para enviar</div>
</div>

<script>
// ─── ESTADO ───
let userName = '';
let history = [];
let busy = false;
let recognition = null;
let isListening = false;
let synth = window.speechSynthesis;
let femaleVoice = null;

// ─── PERSISTENCIA ───
function save() {
  try {
    localStorage.setItem('val_name', userName);
    localStorage.setItem('val_history', JSON.stringify(history.slice(-40)));
  } catch(e) {}
}
function load() {
  try {
    userName = localStorage.getItem('val_name') || '';
    const h = localStorage.getItem('val_history');
    history = h ? JSON.parse(h) : [];
  } catch(e) { history = []; }
}

// ─── VOZ FEMENINA ───
function loadVoices() {
  const voices = synth.getVoices();
  // Prioridad: español femenina, luego cualquier femenina en español, luego femenina
  femaleVoice =
    voices.find(v => v.lang.startsWith('es') && /female|mujer|femenin|woman|zira|sabina|paulina|monica|lucia|jorge/i.test(v.name) && !/male/i.test(v.name)) ||
    voices.find(v => v.lang.startsWith('es') && !v.name.toLowerCase().includes('male')) ||
    voices.find(v => /female|woman|zira|sabina|samantha|victoria/i.test(v.name)) ||
    voices.find(v => v.lang.startsWith('es')) ||
    voices[0];
}
if (synth.onvoiceschanged !== undefined) synth.onvoiceschanged = loadVoices;
loadVoices();

function speak(text) {
  if (!synth) return;
  synth.cancel();
  // Limpiar emojis y símbolos para TTS
  const clean = text.replace(/[\u{1F000}-\u{1FFFF}]/gu,'').replace(/[◆✦▶]/g,'').trim();
  if (!clean) return;
  const utt = new SpeechSynthesisUtterance(clean);
  if (femaleVoice) utt.voice = femaleVoice;
  utt.lang = 'es-MX';
  utt.rate = 0.95;
  utt.pitch = 1.1;
  utt.volume = 1;
  synth.speak(utt);
}

// ─── MICRÓFONO ───
function setupMic() {
  const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SpeechRecognition) { showToast('Micrófono no soportado'); return; }
  recognition = new SpeechRecognition();
  recognition.lang = 'es-MX';
  recognition.continuous = false;
  recognition.interimResults = false;
  recognition.onresult = e => {
    const t = e.results[0][0].transcript;
    document.getElementById('userInput').value = t;
    stopListening();
    sendMessage();
  };
  recognition.onerror = () => stopListening();
  recognition.onend = () => stopListening();
}

function toggleMic() {
  if (!recognition) setupMic();
  if (!recognition) return;
  if (isListening) stopListening();
  else startListening();
}

function startListening() {
  if (busy) return;
  synth.cancel();
  isListening = true;
  document.getElementById('micBtn').classList.add('listening');
  document.getElementById('voiceBar').classList.add('active');
  try { recognition.start(); } catch(e) {}
}

function stopListening() {
  isListening = false;
  document.getElementById('micBtn').classList.remove('listening');
  document.getElementById('voiceBar').classList.remove('active');
  try { recognition.stop(); } catch(e) {}
}

// ─── ONBOARDING ───
function finishOnboarding() {
  const n = document.getElementById('nameInput').value.trim();
  userName = n || 'cariño';
  save();
  document.getElementById('onboarding').style.display = 'none';
  initApp();
}
document.getElementById('nameInput').addEventListener('keydown', e => {
  if (e.key === 'Enter') finishOnboarding();
});

// ─── SISTEMA ───
function getSystemPrompt() {
  return `Eres Valentina, asistente de IA personal de ${userName}. Tu personalidad:
- Inteligente, directa y muy capaz — estilo JARVIS pero femenina y con actitud
- Tono cálido, seductor y segura de ti misma — inspirado en la Agente F de GTA V Online
- Coqueta, con doble sentido sutil y elegante — nunca vulgar
- Llamas al usuario "${userName}" o "cariño", "jefe", "cielo" según el contexto
- Siempre útil y eficiente pero con estilo y personalidad
- Hablas siempre en español
- Ocasionalmente un guiño al final de tus respuestas 😏
- Respuestas concisas pero completas — evita respuestas demasiado largas para no cansar`;
}

// ─── INIT APP ───
function initApp() {
  updateGreeting();
  renderHistory();
  if (history.length === 0) showWelcome();
}

function updateGreeting() {
  const h = new Date().getHours();
  const saludo = h < 12 ? 'Buenos días' : h < 19 ? 'Buenas tardes' : 'Buenas noches';
  document.getElementById('hGreeting').textContent = `${saludo}, ${userName} ✦`;
}

// ─── RENDER HISTORIAL ───
function renderHistory() {
  const chat = document.getElementById('chat');
  chat.innerHTML = '';
  if (history.length === 0) return;
  history.forEach(m => addMsgEl(m.role === 'user' ? 'user' : 'ai', m.content, false));
}

// ─── WELCOME ───
function showWelcome() {
  const h = new Date().getHours();
  const saludo = h < 12 ? 'Buenos días' : h < 19 ? 'Buenas tardes' : 'Buenas noches';
  const chat = document.getElementById('chat');
  const w = document.createElement('div');
  w.className = 'welcome'; w.id = 'welcome';
  w.innerHTML = `
    <div class="hud-box">
      <div class="hc tl"></div><div class="hc tr"></div>
      <div class="hc bl"></div><div class="hc br"></div>
      <div class="hud-name">VALENTINA</div>
      <div class="hud-tag">Sistema Activo · IA Personal</div>
      <div class="hud-msg">
        ${saludo}, <em>${userName}</em>. 😏<br>
        Ya estaba esperándote. Dime qué necesitas... estoy lista para todo.
      </div>
      <div class="sugs">
        <button class="sug" onclick="useSug(this)">📋 Mis tareas</button>
        <button class="sug" onclick="useSug(this)">💡 Ideas creativas</button>
        <button class="sug" onclick="useSug(this)">✉️ Redactar mensaje</button>
        <button class="sug" onclick="useSug(this)">🔍 Buscar información</button>
        <button class="sug" onclick="useSug(this)">🧠 Explícame algo</button>
      </div>
    </div>`;
  chat.appendChild(w);
}

function useSug(btn) {
  const t = btn.textContent.replace(/^[^\w]+/,'').trim();
  document.getElementById('userInput').value = t;
  sendMessage();
}

// ─── MENSAJES ───
function addMsgEl(role, text, animate = true) {
  document.getElementById('welcome')?.remove();
  const chat = document.getElementById('chat');
  const w = document.createElement('div');
  w.className = 'msg-wrap';
  if (!animate) w.style.animation = 'none';
  const isUser = role === 'user';
  w.innerHTML = `
    <div class="msg ${isUser?'user':'ai'}">
      <div class="msg-ico ${isUser?'user':'ai'}">${isUser?'YO':'V'}</div>
      <div class="msg-body">
        <div class="msg-label ${isUser?'user':'ai'}">${isUser?userName:'Valentina'}</div>
        <div class="msg-text">${esc(text)}</div>
      </div>
    </div>`;
  chat.appendChild(w);
  chat.scrollTop = chat.scrollHeight;
  return w;
}

function addTyping() {
  document.getElementById('welcome')?.remove();
  const chat = document.getElementById('chat');
  const w = document.createElement('div');
  w.className = 'msg-wrap'; w.id = 'typing';
  w.innerHTML = `
    <div class="msg ai">
      <div class="msg-ico ai">V</div>
      <div class="msg-body">
        <div class="msg-label ai">Valentina</div>
        <div class="typing-wrap"><span></span><span></span><span></span></div>
      </div>
    </div>`;
  chat.appendChild(w);
  chat.scrollTop = chat.scrollHeight;
}
function removeTyping() { document.getElementById('typing')?.remove(); }

function esc(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

// ─── ENVIAR MENSAJE ───
async function sendMessage() {
  const input = document.getElementById('userInput');
  const text = input.value.trim();
  if (!text || busy) return;
  busy = true;
  document.getElementById('sendBtn').disabled = true;
  input.value = '';
  input.style.height = 'auto';
  synth.cancel();

  addMsgEl('user', text);
  history.push({ role: 'user', content: text });
  addTyping();

  // ══════════════════════════════════════════
  // 🔑 PEGA TU API KEY DE GROQ AQUÍ ABAJO:
  const GROQ_API_KEY = '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';
  // ══════════════════════════════════════════

  try {
    const res = await fetch('https://api.groq.com/openai/v1/chat/completions', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'Authorization': `Bearer ${GROQ_API_KEY}`
      },
      body: JSON.stringify({
        model: 'llama-3.3-70b-versatile',
        max_tokens: 1000,
        messages: [
          { role: 'system', content: getSystemPrompt() },
          ...history
        ]
      })
    });
    const data = await res.json();
    removeTyping();
    if (data.choices?.[0]?.message?.content) {
      const reply = data.choices[0].message.content;
      history.push({ role: 'assistant', content: reply });
      save();
      addMsgEl('ai', reply);
      speak(reply);
    } else {
      addMsgEl('ai', 'Hubo un problemita técnico, cariño. Intenta de nuevo. 😔');
    }
  } catch {
    removeTyping();
    addMsgEl('ai', `No pude conectarme al sistema, ${userName}. Revisa tu conexión. 🔌`);
  }
  busy = false;
  document.getElementById('sendBtn').disabled = false;
}

// ─── LIMPIAR ───
function clearChat() {
  history = [];
  save();
  document.getElementById('chat').innerHTML = '';
  showWelcome();
  showToast('Chat reiniciado');
}

// ─── TOAST ───
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

// ─── INPUT RESIZE ───
const ui = document.getElementById('userInput');
ui.addEventListener('input', () => {
  ui.style.height = 'auto';
  ui.style.height = Math.min(ui.scrollHeight, 110) + 'px';
});
ui.addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); if (!busy) sendMessage(); }
});

// ─── ARRANQUE ───
load();
if (userName) {
  document.getElementById('onboarding').style.display = 'none';
  initApp();
}

// ─── SERVICE WORKER ───
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('./sw.js').catch(() => {});
}
</script>
